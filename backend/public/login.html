<!DOCTYPE html>
<html class="dark" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PULSO - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#d2e900",
              "outline-variant": "#484847",
              "primary-container": "#e0f800",
              "error-dim": "#d53d18",
              "on-secondary-fixed": "#29394e",
              "on-secondary-container": "#c1d1eb",
              "inverse-surface": "#fcf9f8",
              "secondary-fixed": "#c8d8f3",
              "on-secondary-fixed-variant": "#46556b",
              surface: "#0e0e0e",
              "surface-container-highest": "#262626",
              "inverse-primary": "#5a6500",
              primary: "#f7ffba",
              "secondary-fixed-dim": "#bacae4",
              "surface-bright": "#2c2c2c",
              "on-error": "#450900",
              "surface-dim": "#0e0e0e",
              "on-primary-fixed": "#414900",
              "surface-container-low": "#131313",
              "tertiary-dim": "#c1d0e6",
              "surface-container": "#1a1a1a",
              "primary-dim": "#d8ef00",
              tertiary: "#e0ecff",
              "on-tertiary-fixed": "#2e3d4e",
              "on-primary-fixed-variant": "#5c6700",
              "secondary-dim": "#bacae4",
              "tertiary-fixed": "#cfdef5",
              "on-surface-variant": "#adaaaa",
              "error-container": "#b92902",
              error: "#ff7351",
              "tertiary-fixed-dim": "#c1d0e6",
              "surface-variant": "#262626",
              "on-error-container": "#ffd2c8",
              "surface-container-high": "#20201f",
              "surface-container-lowest": "#000000",
              outline: "#767575",
              "on-surface": "#ffffff",
              secondary: "#c8d8f3",
              background: "#0e0e0e",
              "on-tertiary": "#49586b",
              "on-background": "#ffffff",
              "on-tertiary-container": "#414f62",
              "on-primary": "#5a6500",
              "primary-fixed": "#e0f800",
              "on-primary-container": "#525c00",
              "on-secondary": "#3c4c61",
              "tertiary-container": "#cfdef5",
              "secondary-container": "#38485d",
              "inverse-on-surface": "#565555",
              "surface-tint": "#f7ffba",
              "on-tertiary-fixed-variant": "#4a596c"
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem"
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"]
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .primary-glow {
        box-shadow: 0 0 20px rgba(230, 255, 0, 0.3);
      }
      .glass-panel {
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(24px);
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container antialiased">
    <div class="min-h-screen flex flex-col md:flex-row overflow-hidden">
      <!-- Hero Section -->
      <section class="relative w-full md:w-3/5 lg:w-2/3 h-64 md:h-screen overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-background via-transparent to-transparent z-10 hidden md:block"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-background to-transparent z-10 md:hidden"></div>
        <img class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale hover:grayscale-0 transition-all duration-700" data-alt="DJ Controller" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6GQjwzDWX_diV5mw2HEqiJWYDw6CxgUQWu3m8tyeavDB3EE5w3wH0CbUfXfJUXvhugT0Trqm-czL2LlRUjfSAhfEfnKBcuD-dQBOeBewuP5vvpmx0_5fpR0THm3eKD6ma0fKY4SThH4PAm2quQygshWE9meRJZcS_BVhTPuMg89CnVm0s95qBFWqXiB1TOwE9lrL33O9KkSBt2ewX4NEi8LSUUhNkhxNTEYQ7Y2PkemVPuxmTtaxcOWKfMqdH28fCt9bQ6f4Fy_Y" />
        <div class="relative z-20 h-full flex flex-col justify-end p-8 md:p-16 lg:p-24">
          <div class="mb-4">
            <span class="inline-block bg-primary-container text-on-primary-container px-3 py-1 text-[10px] font-bold uppercase tracking-[0.2em] rounded-sm mb-6">Premium Editorial</span>
            <h1 class="font-headline text-5xl md:text-7xl lg:text-8xl font-extrabold italic tracking-tighter leading-none text-white">PULSO</h1>
          </div>
          <p class="font-headline text-xl md:text-2xl lg:text-3xl font-medium text-primary-fixed-dim max-w-xl leading-snug">Sinta a batida. Controle a sua carreira.</p>
        </div>
      </section>

      <!-- Login Container -->
      <main class="w-full md:w-2/5 lg:w-1/3 flex items-center justify-center p-6 md:p-12 lg:p-16 bg-surface">
        <div class="w-full max-w-md">
          <header class="mb-10">
            <h2 class="font-headline text-3xl font-bold text-white mb-2 tracking-tight">Bem-vindo ao Palco</h2>
            <p class="text-on-surface-variant text-sm">Acesse sua plataforma editorial de performance.</p>
          </header>

          <form id="loginForm" class="space-y-6">
            <!-- Email Field -->
            <div class="space-y-2">
              <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="email">E-mail Profissional</label>
              <div class="relative group">
                <input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/40" id="email" placeholder="dj@pulsomusical.com.br" type="email" required />
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined opacity-50 group-focus-within:text-primary-container group-focus-within:opacity-100">mail</span>
              </div>
            </div>

            <!-- Password Field -->
            <div class="space-y-2">
              <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="password">Senha Secreta</label>
              <div class="relative group">
                <input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/40" id="password" placeholder="••••••••" type="password" required />
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined opacity-50 group-focus-within:text-primary-container group-focus-within:opacity-100">lock</span>
              </div>
            </div>

            <!-- Error Message -->
            <div id="errorMsg" class="hidden bg-error-container text-on-error-container px-4 py-3 rounded-xl text-sm"></div>

            <!-- Loading State -->
            <button id="submitBtn" class="w-full bg-primary-container text-on-primary-container font-headline font-extrabold py-5 rounded-full primary-glow hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
              <span id="btnText">ENTRAR NA PLATAFORMA</span>
              <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" id="btnIcon">arrow_forward</span>
            </button>
          </form>

          <!-- Divider -->
          <div class="relative my-10 flex items-center justify-center">
            <div class="w-full h-[1px] bg-outline-variant/20"></div>
            <span class="absolute bg-surface px-4 text-[10px] font-bold uppercase tracking-[0.3em] text-outline">ou crie uma conta</span>
          </div>

          <!-- Register Link -->
          <a href="/register.html" class="w-full block text-center bg-surface-container-high border border-outline-variant/20 hover:border-outline-variant/40 text-on-surface font-headline font-bold py-4 rounded-full transition-colors">
            CRIAR UMA NOVA CONTA
          </a>

          <!-- Footer Links -->
          <footer class="mt-12 text-center">
            <p class="text-on-surface-variant text-sm">
              Problemas para entrar?
              <a class="text-primary-container font-bold hover:underline ml-1" href="#">Recuperar conta</a>
            </p>
          </footer>
        </div>
      </main>
    </div>

    <!-- System Status Panel -->
    <div class="fixed top-8 right-8 z-50 hidden lg:block">
      <div class="glass-panel p-4 rounded-full flex items-center gap-4 border border-white/5">
        <div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
          <span class="material-symbols-outlined text-on-primary">graphic_eq</span>
        </div>
        <div>
          <p class="text-[10px] text-on-surface-variant uppercase tracking-widest font-bold">Status do Sistema</p>
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-[#e6ff00] animate-pulse"></div>
            <p class="text-xs text-white font-medium">Frequência Estável</p>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
      // Redirecionar se já está logado
      window.addEventListener('load', () => {
        redirectIfLoggedIn();
      });

      // Form submission
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        // Clear error
        errorMsg.classList.add('hidden');
        submitBtn.disabled = true;
        btnText.textContent = 'ENTRANDO...';
        btnIcon.textContent = 'hourglass_empty';

        try {
          const data = await login(email, password);
          
          // Redirect based on role
          const route = data.user.role === 'ARTIST' ? '/dashboard.html' : '/index.html';
          window.location.href = route;
        } catch (err) {
          errorMsg.textContent = err.message || 'Erro ao fazer login. Verifique seus dados.';
          errorMsg.classList.remove('hidden');
          submitBtn.disabled = false;
          btnText.textContent = 'ENTRAR NA PLATAFORMA';
          btnIcon.textContent = 'arrow_forward';
        }
      });
    </script>
  </body>
</html>
