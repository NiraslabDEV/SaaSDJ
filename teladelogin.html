<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container antialiased">
<div class="min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Hero Section (Asymmetric Left) -->
<section class="relative w-full md:w-3/5 lg:w-2/3 h-64 md:h-screen overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-background via-transparent to-transparent z-10 hidden md:block"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent z-10 md:hidden"></div>
<img class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale hover:grayscale-0 transition-all duration-700" data-alt="Cinematic shot of a professional DJ controller in a dark studio with neon yellow light reflections and atmospheric smoke" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6GQjwzDWX_diV5mw2HEqiJWYDw6CxgUQWu3m8tyeavDB3EE5w3wH0CbUfXfJUXvhugT0Trqm-czL2LlRUjfSAhfEfnKBcuD-dQBOeBewuP5vvpmx0_5fpR0THm3eKD6ma0fKY4SThH4PAm2quQygshWE9meRJZcS_BVhTPuMg89CnVm0s95qBFWqXiB1TOwE9lrL33O9KkSBt2ewX4NEi8LSUUhNkhxNTEYQ7Y2PkemVPuxmTtaxcOWKfMqdH28fCt9bQ6f4Fy_Y"/>
<div class="relative z-20 h-full flex flex-col justify-end p-8 md:p-16 lg:p-24">
<div class="mb-4">
<span class="inline-block bg-primary-container text-on-primary-container px-3 py-1 text-[10px] font-bold uppercase tracking-[0.2em] rounded-sm mb-6">Premium Editorial</span>
<h1 class="font-headline text-5xl md:text-7xl lg:text-8xl font-extrabold italic tracking-tighter leading-none text-white">
                        PULSO
                    </h1>
</div>
<p class="font-headline text-xl md:text-2xl lg:text-3xl font-medium text-primary-fixed-dim max-w-xl leading-snug">
                    Sinta a batida. Controle a sua carreira.
                </p>
</div>
</section>
<!-- Login Container (The "Sonic Curator" Interface) -->
<main class="w-full md:w-2/5 lg:w-1/3 flex items-center justify-center p-6 md:p-12 lg:p-16 bg-surface">
<div class="w-full max-w-md">
<header class="mb-10">
<h2 class="font-headline text-3xl font-bold text-white mb-2 tracking-tight">Bem-vindo ao Palco</h2>
<p class="text-on-surface-variant text-sm">Acesse sua plataforma editorial de performance.</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="email">E-mail Profissional</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/40" id="email" placeholder="dj@pulsomusical.com.br" type="email"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined opacity-50 group-focus-within:text-primary-container group-focus-within:opacity-100">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="password">Senha Secreta</label>
<a class="text-[10px] uppercase font-bold text-primary-container hover:text-white transition-colors" href="#">Esqueceu a senha?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/40" id="password" placeholder="••••••••" type="password"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined opacity-50 group-focus-within:text-primary-container group-focus-within:opacity-100">lock</span>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline font-extrabold py-5 rounded-full primary-glow hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                        ENTRAR NA PLATAFORMA
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center justify-center">
<div class="w-full h-[1px] bg-outline-variant/20"></div>
<span class="absolute bg-surface px-4 text-[10px] font-bold uppercase tracking-[0.3em] text-outline">ou conecte-se com</span>
</div>
<!-- Social Login Grid -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high py-4 rounded-xl transition-colors group">
<svg class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-5.38z" fill="#EA4335"></path>
</svg>
<span class="text-xs font-bold uppercase tracking-wider text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high py-4 rounded-xl transition-colors group">
<svg class="w-5 h-5 fill-white" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.04 1.43-3.23 1.43-1.16 0-2.15-.36-2.98-1.07-.84.71-1.89 1.07-3.13 1.07-1.19 0-2.25-.46-3.19-1.39-1.97-1.93-2.96-5.02-2.96-9.25 0-2.39.58-4.24 1.74-5.54 1.16-1.29 2.62-1.94 4.38-1.94 1.04 0 2.01.27 2.92.81.71.43 1.35.43 1.91 0 .93-.54 1.95-.81 3.06-.81 1.57 0 2.85.54 3.86 1.63-2.16 1.25-3.24 3.06-3.24 5.43 0 1.83.67 3.33 2.01 4.51-.59 1.44-1.3 2.46-2.14 3.06zm-4.75-17.63c0 1.13-.41 2.1-1.23 2.92-.83.82-1.82 1.23-2.98 1.23.04-1.12.46-2.09 1.27-2.91.81-.81 1.79-1.22 2.94-1.24z"></path>
</svg>
<span class="text-xs font-bold uppercase tracking-wider text-on-surface">Apple</span>
</button>
</div>
<!-- Footer Links -->
<footer class="mt-12 text-center">
<p class="text-on-surface-variant text-sm">
                        Ainda não faz parte do lineup? 
                        <a class="text-primary-container font-bold hover:underline ml-1" href="#">Criar conta</a>
</p>
</footer>
</div>
</main>
</div>
<!-- Minimal Overlay Elements (Glassmorphism) -->
<div class="fixed top-8 right-8 z-50 hidden lg:block">
<div class="glass-panel p-4 rounded-full flex items-center gap-4 border border-white/5">
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary">graphic_eq</span>
</div>
<div>
<p class="text-[10px] text-on-surface-variant uppercase tracking-widest font-bold">Status do Sistema</p>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-[#e6ff00] animate-pulse"></div>
<p class="text-xs text-white font-medium">Frequência Estável</p>
</div>
</div>
</div>
</div>
</body></html>
